<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; text-align: center; }
        
        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease; }
        .logo-anim { width: 80px; height: 80px; background: var(--yellow); border-radius: 20px; animation: bounce 1.5s infinite; margin-bottom: 15px; box-shadow: 0 0 20px var(--yellow); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Main UI */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .balance-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 20px; }
        #points { font-size: 3em; color: var(--yellow); font-weight: 900; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .icon { font-size: 24px; margin-bottom: 8px; }

        /* Modal & Lists */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 25px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #111; color: white; }
        .history-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; text-align: left; margin-top: 10px; border: 1px solid #333; font-size: 0.8em; max-height: 150px; overflow-y: auto; }
        
        .admin-trigger { margin-top: 40px; opacity: 0.2; font-size: 10px; cursor: pointer; }
        #admin-panel { display: none; background: #222; margin-top: 20px; padding: 20px; border-radius: 15px; border: 1px dashed var(--yellow); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim"></div>
        <h1 style="color: var(--yellow);">Lahi Earn Pro</h1>
        <p>Loading...</p>
    </div>

    <div class="container">
        <div class="balance-card">
            <p style="margin:0; opacity: 0.8;">Available Balance</p>
            <div id="points">0</div>
            <p style="margin:0; font-weight: bold;">POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" id="adBtn" onclick="watchAd()">
                <span class="icon">📺</span> <span id="adText">Watch Ad (+100)</span>
            </button>

            <button class="action-btn" id="dailyBtn" onclick="claimDaily()">
                <span class="icon">🎁</span> Daily Bonus
            </button>

            <button class="action-btn" onclick="openModal('withdraw-modal')">
                <span class="icon">💸</span> Withdraw
            </button>

            <button class="action-btn" onclick="shareRef()">
                <span class="icon">👥</span> Invite (+150)
            </button>

            <button class="action-btn" onclick="openYT()">
                <span class="icon">🔴</span> YouTube (+250)
            </button>

            <button class="action-btn" onclick="window.open('https://t.me/hiru1397bot')">
                <span class="icon">🎧</span> Support
            </button>
        </div>

        <h4 style="text-align:left; color:var(--yellow); margin-bottom:5px;">Transaction History</h4>
        <div class="history-box" id="user-history">No transactions yet.</div>

        <p style="margin-top:20px; font-size: 0.9em; opacity: 0.7;">📊 Real-time Users: <span id="user-count">0</span></p>

        <div class="admin-trigger" onclick="openAdmin()">ADMIN ACCESS</div>
        <div id="admin-panel">
            <h3>Admin Panel (Requests)</h3>
            <div id="request-list" style="text-align:left; font-size: 0.8em;"></div>
        </div>
    </div>

    <div id="withdraw-modal" class="modal">
        <h2 style="color: var(--yellow);">Withdrawal</h2>
        <p>Min Withdrawal: 4,000 Points</p>
        <select id="method" onchange="checkMethod()">
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Binance (USDT)">Binance (USDT)</option>
            <option value="eZ Cash">eZ Cash</option>
            <option value="mCash">mCash</option>
            <option value="Mobile Reload">Mobile Reload</option>
        </select>
        <div id="bank-info">
            <input type="text" id="w-name" placeholder="Full Name">
            <input type="text" id="w-bank" placeholder="Bank Name">
            <input type="text" id="w-branch" placeholder="Branch Name">
            <input type="text" id="w-acc" placeholder="Account Number">
        </div>
        <div id="other-info" style="display:none;"><input type="text" id="w-details" placeholder="Number or Wallet ID"></div>
        <input type="number" id="w-amount" placeholder="Points to Withdraw">
        <button class="action-btn" style="width:100%; background:#2ecc71; color:white;" onclick="processWithdraw()">Submit Request</button>
        <button class="action-btn" style="width:100%; background:#e74c3c; color:white; margin-top:10px;" onclick="closeModal('withdraw-modal')">Cancel</button>
    </div>

    <script>
        // Points Initialization
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points.toLocaleString();

        // User Count Logic (Real starting from 0)
        let totalUsers = parseInt(localStorage.getItem('total_user_count')) || 0;
        if (!localStorage.getItem('user_registered')) {
            totalUsers += 1;
            localStorage.setItem('total_user_count', totalUsers);
            localStorage.setItem('user_registered', 'true');
        }
        document.getElementById('user-count').innerText = totalUsers.toLocaleString();

        // Splash Hide
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 800); }, 2000);

        // Monetag Ad & 10s Countdown
        function watchAd() {
            if (typeof show_10837568 === 'function') {
                show_10837568('pop').then(() => {
                    updatePoints(100);
                    startAdCooldown();
                }).catch(e => alert("Ad not ready. Try again."));
            }
        }

        function startAdCooldown() {
            const btn = document.getElementById('adBtn');
            const txt = document.getElementById('adText');
            btn.disabled = true;
            let timer = 10;
            txt.innerText = `Wait ${timer}s`;
            let interval = setInterval(() => {
                timer--;
                if(timer > 0) {
                    txt.innerText = `Wait ${timer}s`;
                } else {
                    clearInterval(interval);
                    btn.disabled = false;
                    txt.innerText = "Watch Ad (+100)";
                }
            }, 1000);
        }

        // Daily Bonus
        function claimDaily() {
            const today = new Date().toDateString();
            if(localStorage.getItem('lastDaily') === today) {
                alert("Already claimed today!");
            } else {
                updatePoints(50);
                localStorage.setItem('lastDaily', today);
                alert("Daily Bonus 50 Points Added!");
            }
        }

        function openYT() {
            window.open("https://youtube.com/@hiruwaofficial-b2i?si=uwmmXfFRkSkP0rQ3", "_blank");
            setTimeout(() => { updatePoints(250); }, 8000);
        }

        function shareRef() {
            window.open(`https://t.me/share/url?url=https://t.me/hiru1397bot&text=Join Lahi Earn Pro!`);
            updatePoints(150);
        }

        function updatePoints(amt) {
            points += amt;
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points.toLocaleString();
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkMethod() {
            let m = document.getElementById('method').value;
            document.getElementById('bank-info').style.display = (m === 'Bank Transfer') ? 'block' : 'none';
            document.getElementById('other-info').style.display = (m !== 'Bank Transfer') ? 'block' : 'none';
        }

        // Withdraw & History Logic
        function processWithdraw() {
            let amt = parseInt(document.getElementById('w-amount').value);
            if(amt < 4000) return alert("Minimum 4000 Points!");
            if(amt > points) return alert("Insufficient Balance!");

            let method = document.getElementById('method').value;
            let reqs = JSON.parse(localStorage.getItem('lahi_requests')) || [];
            reqs.push({ method, amt, status: 'Pending', date: new Date().toLocaleDateString() });
            localStorage.setItem('lahi_requests', JSON.stringify(reqs));

            points -= amt;
            updatePoints(0);
            updateHistory();
            alert("Withdrawal Requested!");
            closeModal('withdraw-modal');
        }

        function updateHistory() {
            let reqs = JSON.parse(localStorage.getItem('lahi_requests')) || [];
            let html = reqs.reverse().map(r => `<div>📅 ${r.date} - ${r.amt} pts (${r.method}) - <b>${r.status}</b></div>`).join('');
            document.getElementById('user-history').innerHTML = html || "No transactions yet.";
        }
        updateHistory();

        function openAdmin() {
            if(prompt("Admin Password:") === "ADMIN4053") {
                document.getElementById('admin-panel').style.display = 'block';
                let reqs = JSON.parse(localStorage.getItem('lahi_requests')) || [];
                document.getElementById('request-list').innerHTML = reqs.map((r,i) => `<div>${i+1}. ${r.method} | ${r.amt} pts | ${r.status}</div>`).join('');
            }
        }
    </script>
</body>
</html>
