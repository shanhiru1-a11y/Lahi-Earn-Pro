<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    <script src="https://adsgram.ai/sdk-v1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f1c40f; --bg: #0f172a; --card: #1e293b; --success: #2ecc71; }
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Startup Animation */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .logo-anim {
            font-size: 32px; font-weight: 800; color: var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }

        .container { padding: 20px; width: 100%; max-width: 450px; display: none; animation: slideUp 0.8s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .balance-card { 
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 30px; border-radius: 30px; margin: 20px 0; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
        }

        #balance { font-size: 50px; font-weight: 800; color: var(--primary); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { 
            background: var(--card); color: white; border: none; padding: 15px; 
            border-radius: 18px; font-weight: 600; cursor: pointer; transition: 0.2s;
            border-bottom: 4px solid rgba(0,0,0,0.3);
        }
        .btn:active { transform: translateY(2px); border-bottom: none; }
        .btn-main { grid-column: span 2; background: linear-gradient(90deg, #0088cc, #005588); font-size: 16px; }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 380px; background: #1e293b; padding: 25px; border-radius: 25px; 
            z-index: 1001; border: 2px solid var(--primary);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }

        select, input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #475569; background: #0f172a; color: white;
        }

        .user-count { font-size: 12px; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body onload="startApp()">

<div id="splash">
    <div class="logo-anim">LAHI EARN PRO</div>
    <p style="font-size: 12px; opacity: 0.5;">Loading your wallet...</p>
</div>

<div class="container" id="mainApp">
    <h3 style="color: var(--primary); margin-bottom: 5px;">LAHI EARN PRO</h3>
    <div class="user-count">👥 Total Active Users: <span id="totalUsers">Loading...</span></div>
    
    <div class="balance-card">
        <p style="margin:0; opacity:0.7;">YOUR EARNINGS</p>
        <div id="balance">0</div>
        <div id="adminPoints" style="font-size: 11px; color: #94a3b8; display:none;">(Admin Commission Syncing...)</div>
    </div>

    <div class="grid">
        <button class="btn btn-main" onclick="showAd()">📺 WATCH VIDEO AD <br><span style="font-size:10px;">(+80 Points)</span></button>
        <button class="btn" style="background:#c4302b;" onclick="window.open('https://youtube.com/@hiruwaofficial-b2i')">🔴 YOUTUBE</button>
        <button class="btn" style="background:#8e44ad;" onclick="openModal('refModal')">👥 REFER</button>
        <button class="btn btn-main" style="background: var(--success);" onclick="openModal('withdrawModal')">💰 WITHDRAW ALL (MIN 4000)</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div id="withdrawModal" class="modal">
    <h3 style="color:var(--primary)">Select Method</h3>
    <select id="method" onchange="toggleFields()">
        <option value="Bank">Bank Transfer</option>
        <option value="Binance">Binance (USDT)</option>
        <option value="EzCash">EzCash</option>
        <option value="mCash">mCash</option>
        <option value="Reload">Mobile Reload</option>
    </select>
    <input type="text" placeholder="Account Name / User ID" id="wName">
    <input type="text" placeholder="Account Number / Phone" id="wNum">
    <button class="btn btn-main" style="background:var(--success); margin-top:10px;" onclick="requestWithdraw()">SEND REQUEST</button>
</div>

<div id="refModal" class="modal">
    <h3>Refer a Friend</h3>
    <p>Get bonus points when a new friend joins!</p>
    <button class="btn btn-main" onclick="closeModals()">CLOSE</button>
</div>

<script>
    let points = parseInt(localStorage.getItem('lahiPoints')) || 0;
    let adminCommission = parseInt(localStorage.getItem('lahiAdminPoints')) || 0;
    
    const BOT_TOKEN = "8707763491:AAE8b44xX4lI_k_nhjN-DwbYAfYB8S9ntWg";
    const ADMIN_CHAT_ID = "8193830513";
    let AdController;

    function startApp() {
        // Startup Animation
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            updateUI();
            checkRegistration();
        }, 3000);

        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "26784" });
        }
        
        // Simulate User Count (In real app, this comes from database)
        document.getElementById('totalUsers').innerText = Math.floor(Math.random() * 500) + 120;
    }

    // New User Registration Bonus for Admin
    function checkRegistration() {
        if (!localStorage.getItem('isRegistered')) {
            // පළමු වතාවට Register වෙද්දී Admin ට points 100ක් යවනවා
            sendAdminUpdate("New User Registered! +100 Points for Admin.");
            localStorage.setItem('isRegistered', 'true');
        }
    }

    function showAd() {
        if (AdController) {
            AdController.show().then(() => {
                // Point බෙදීම: User ට 80, Admin ට 20 (Total 100)
                points += 80;
                adminCommission += 20;
                savePoints();
                alert("සාර්ථකයි! ඔබට ලකුණු 80ක් ලැබුණා. (20% Admin Commission සාර්ථකව වෙන්විය)");
            }).catch(() => alert("Ads පූරණය වීමේ දෝෂයක්!"));
        }
    }

    function requestWithdraw() {
        const method = document.getElementById('method').value;
        const name = document.getElementById('wName').value;
        const num = document.getElementById('wNum').value;

        if (points < 4000) {
            alert("සමාවෙන්න, අවම Withdraw එක 4000 Points විය යුතුයි.");
            return;
        }

        if (name && num) {
            const msg = `🔔 *NEW WITHDRAW REQUEST*\n\n👤 Method: ${method}\n👤 User: ${name}\n💳 Details: ${num}\n💰 Points: ${points}\n\n⚠️ *APPROVAL REQUIRED*`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            
            alert("ඔබේ ඉල්ලීම Admin වෙත යොමු කළා. දත්ත පරීක්ෂා කර ඔහු Approve කළ පසු මුදල් ලැබෙනු ඇත.");
            
            // Withdraw කරන විට සියලුම points අඩු කිරීම
            points = 0; 
            savePoints();
            closeModals();
        } else {
            alert("කරුණාකර විස්තර සම්පූර්ණ කරන්න.");
        }
    }

    function sendAdminUpdate(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}`);
    }

    function savePoints() {
        localStorage.setItem('lahiPoints', points);
        localStorage.setItem('lahiAdminPoints', adminCommission);
        updateUI();
    }

    function updateUI() {
        document.getElementById('balance').innerText = points.toLocaleString();
    }

    function openModal(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeModals() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }
</script>

</body>
</html>
