<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    <script src="https://adsgram.ai/sdk-v1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f1c40f; --secondary: #0088cc; --bg: #0f172a; --card: #1e293b; --accent: #e74c3c; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* Startup Animation */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: flex;
            justify-content: center; align-items: center;
        }
        .logo-anim {
            font-size: 35px; font-weight: 800; color: var(--primary);
            letter-spacing: 5px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }

        .container { padding: 20px; max-width: 450px; margin: auto; display: none; animation: fadeIn 1s ease-in; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .balance-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 30px; 
            margin: 20px 0; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #balance { 
            font-size: 55px; 
            font-weight: 800; 
            color: var(--primary); 
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn { 
            background: var(--card); 
            color: white; 
            border: none; 
            padding: 18px 5px; 
            border-radius: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 14px; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 5px solid rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.95); border-bottom: none; }

        .btn-full { grid-column: span 2; background: linear-gradient(90deg, #0088cc, #00aaff); font-size: 16px; }

        .modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; 
            background: #1e293b; 
            padding: 25px; 
            border-radius: 30px; 
            z-index: 1001; 
            border: 2px solid var(--primary);
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }

        select, input { width: 95%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
    </style>
</head>
<body onload="initApp()">

<div id="splash">
    <div class="logo-anim">LAHI EARN PRO</div>
</div>

<div class="container" id="mainContent">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2 style="letter-spacing: 2px; color: var(--primary); margin:0;">LAHI EARN PRO</h2>
        <button onclick="adminLogin()" style="background:none; border:none; color:#334155; font-size:10px;">ADMIN</button>
    </div>
    
    <p style="font-size:12px; color:gray; margin-top:10px;">👥 Active Users: <span id="userCount">0</span></p>

    <div class="balance-card">
        <p style="margin:0; opacity:0.6; font-size: 14px;">AVAILABLE POINTS</p>
        <div id="balance">0</div>
    </div>

    <div class="grid">
        <button class="btn btn-full" onclick="showAd()">📺 WATCH VIDEO AD <span style="font-size:10px; opacity:0.8;">(+80 Points)</span></button>
        <button class="btn btn-full" style="background: linear-gradient(90deg, #c4302b, #ff4444);" onclick="doTask()">🔴 SUBSCRIBE YOUTUBE <span style="font-size:10px; opacity:0.8;">(+50 Points)</span></button>
        <button class="btn" style="background: #e67e22;" onclick="openModal('lbModal')">🏆 RANKING</button>
        <button class="btn" style="background: #8e44ad;" onclick="openModal('refModal')">👥 FRIENDS</button>
        <button class="btn btn-full" style="background: linear-gradient(90deg, #27ae60, #2ecc71);" onclick="openModal('withdrawModal')">💰 WITHDRAW ALL MONEY</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div id="withdrawModal" class="modal">
    <h3 style="color:var(--primary)">Withdraw Money</h3>
    <select id="wMethod">
        <option value="Bank">Bank Transfer</option>
        <option value="Binance">Binance (USDT)</option>
        <option value="EzCash">Ez Cash</option>
        <option value="mCash">m Cash</option>
        <option value="Reload">Mobile Reload</option>
    </select>
    <input type="text" placeholder="Account Name / Phone" id="accName">
    <input type="text" placeholder="Account Number / ID" id="accNum">
    <button class="btn btn-full" onclick="sendWithdrawRequest()">SUBMIT REQUEST</button>
    <p style="font-size:10px; color:grey; margin-top:10px;">Minimum withdraw: 4,000 Points</p>
</div>

<div id="lbModal" class="modal">
    <h3 style="color:var(--primary)">Top Earners 🏆</h3>
    <p>1. Lahiru (Admin) - 99,999</p>
    <p>Wait for next update...</p>
    <button class="btn btn-full" onclick="closeModals()">CLOSE</button>
</div>

<div id="refModal" class="modal">
    <h3 style="color:var(--primary)">Invite Friends 👥</h3>
    <p>Invite friends and earn points!</p>
    <button class="btn btn-full" onclick="closeModals()">CLOSE</button>
</div>

<script>
    let points = parseInt(localStorage.getItem('lahiPoints')) || 0;
    const BOT_TOKEN = "8707763491:AAE8b44xX4lI_k_nhjN-DwbYAfYB8S9ntWg";
    const ADMIN_CHAT_ID = "8193830513";
    let AdController;

    function initApp() {
        // Startup Animation
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }, 3000);

        document.getElementById('balance').innerText = points.toLocaleString();
        
        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "26784" });
        }

        // New User Registration Alert
        if (!localStorage.getItem('registered')) {
            sendToTelegram("🚀 New User Joined Lahi Earn Pro!");
            localStorage.setItem('registered', 'true');
        }
    }

    function showAd() {
        if (AdController) {
            AdController.show().then(() => {
                // User gets 80, Admin gets 20 (Total 100)
                points += 80;
                savePoints();
                sendToTelegram("💰 Commission: You earned 20 Points from an Ad view!");
                alert("සාර්ථකයි! ලකුණු 80ක් එකතු වුණා. 🎉");
            }).catch(() => alert("Ad පූරණය වීමේ දෝෂයක්."));
        }
    }

    function sendWithdrawRequest() {
        const method = document.getElementById('wMethod').value;
        const name = document.getElementById('accName').value;
        const num = document.getElementById('accNum').value;

        if (points < 4000) {
            alert("අවම ලකුණු 4000ක් අවශ්‍යයි!");
            return;
        }

        if (name && num) {
            const msg = `🔔 *NEW WITHDRAW REQUEST*\n\n👤 User: ${name}\n💳 Method: ${method}\n🔢 Acc/Num: ${num}\n💰 Points: ${points}\n\n⚠️ *WAITING FOR YOUR APPROVAL*`;
            sendToTelegram(msg);
            alert("ඔබේ ඉල්ලීම යොමු කළා! Admin විසින් පරීක්ෂා කර Approve කළ පසු මුදල් ලැබෙනු ඇත.");
            points = 0; // සියල්ල Withdraw කිරීම
            savePoints();
            closeModals();
        } else {
            alert("කරුණාකර විස්තර ඇතුළත් කරන්න.");
        }
    }

    function adminLogin() {
        let pass = prompt("Admin Password එක ඇතුළත් කරන්න:");
        if (pass === "ADMIN789") {
            alert("Welcome Admin! ඔයාට ලැබුණු Commission එක Telegram එකෙන් බලාගන්න.");
        } else {
            alert("වැරදි Password එකක්!");
        }
    }

    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
    }

    function doTask() {
        window.open("https://youtube.com/@hiruwaofficial-b2i", "_blank");
        setTimeout(() => { if(confirm("ඔබ Subscribe කළාද?")) { points += 50; savePoints(); } }, 5000);
    }

    function savePoints() {
        localStorage.setItem('lahiPoints', points);
        document.getElementById('balance').innerText = points.toLocaleString();
    }

    function openModal(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeModals() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }
</script>
</body>
</html>
