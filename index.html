<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .balance-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 20px; }
        #points { font-size: 3.5em; color: var(--yellow); font-weight: 900; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 25px; z-index: 2000; box-sizing: border-box; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--yellow); margin-top: 40px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #222; color: white; text-align: center; box-sizing: border-box; }
        .verify-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="balance-card">
            <p style="margin:0; opacity: 0.8;">Total Balance</p>
            <div id="points">0</div>
            <p style="margin:0; font-weight: bold;">POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" id="adBtn" onclick="watchAd()">📺 <span id="adText">Watch Ad (+100)</span></button>
            <button class="action-btn" onclick="claimDaily()">🎁 Daily Bonus</button>
            <button class="action-btn" onclick="openModal('withdraw-modal')">💸 Withdraw</button>
            <button class="action-btn" onclick="startTask('ref')">👥 Invite (+150)</button>
            <button class="action-btn" id="ytBtn" onclick="startTask('yt')">🔴 YouTube (+250)</button>
            <button class="action-btn" onclick="window.open('https://t.me/hiru1397bot')">🎧 Support</button>
        </div>
        
        <p style="margin-top:20px; font-size: 0.8em; opacity: 0.6;">📊 Total Users: <span id="user-count">0</span></p>
    </div>

    <div id="verify-modal" class="modal">
        <div class="modal-content">
            <h3 id="v-title" style="color:var(--yellow);">Verify Task</h3>
            <input type="text" id="v-input" placeholder="Enter Secret Code">
            <div id="v-timer" style="font-size: 1.5em; font-weight: bold; margin: 10px;">30s</div>
            <button id="v-claim-btn" class="verify-btn" style="display:none;" onclick="checkSecretCode()">CLAIM POINTS</button>
            <button onclick="closeModal('verify-modal')" style="background:none; color:red; border:none; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="withdraw-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--yellow);">Withdraw</h2>
            <select id="method">
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Binance">Binance (USDT)</option>
                <option value="eZ Cash/mCash">eZ Cash / mCash</option>
            </select>
            <input type="text" id="w-details" placeholder="Account Number / ID">
            <input type="number" id="w-amount" placeholder="Min 4000 Points">
            <button class="verify-btn" onclick="processWithdraw()">Send Request</button>
            <button onclick="closeModal('withdraw-modal')" style="background:none; color:red; border:none; margin-top:10px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points.toLocaleString();

        const YT_CODE = "LAHI77"; 
        const REF_CODE = "JOIN150";
        let activeTaskType = "";

        // --- Telegram Bot Details (Mekata thama withdraw requests enne) ---
        const BOT_TOKEN = "7670732431:AAEq2f43x_R6FwA1rFhH7v7I1o-h29w-nU4"; // Oyaage Bot Token eka methanata danna (danata mama ekak damma)
        const ADMIN_CHAT_ID = "6348651877"; // Oyaage Chat ID eka danna

        function updatePoints(amt) {
            points += amt;
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points.toLocaleString();
        }

        function watchAd() {
            if (typeof show_10837568 === 'function') {
                show_10837568('pop').then(() => { updatePoints(100); startAdCooldown(); });
            }
        }

        function startAdCooldown() {
            const btn = document.getElementById('adBtn');
            const txt = document.getElementById('adText');
            btn.disabled = true;
            let timer = 10;
            let interval = setInterval(() => {
                txt.innerText = `Wait ${timer}s`;
                timer--;
                if(timer < 0) { clearInterval(interval); btn.disabled = false; txt.innerText = "Watch Ad (+100)"; }
            }, 1000);
        }

        function startTask(type) {
            activeTaskType = type;
            window.open((type === 'yt') ? "https://youtube.com/@hiruwaofficial-b2i" : "https://t.me/share/url?url=https://t.me/hiru1397bot", "_blank");
            openModal('verify-modal');
            let timer = (type === 'yt') ? 30 : 15;
            document.getElementById('v-claim-btn').style.display = 'none';
            document.getElementById('v-timer').style.display = 'block';
            let interval = setInterval(() => {
                document.getElementById('v-timer').innerText = `Verifying... ${timer}s`;
                timer--;
                if(timer < 0) { clearInterval(interval); document.getElementById('v-timer').style.display = 'none'; document.getElementById('v-claim-btn').style.display = 'block'; }
            }, 1000);
        }

        function checkSecretCode() {
            let input = document.getElementById('v-input').value.trim().toUpperCase();
            let correct = (activeTaskType === 'yt') ? YT_CODE : REF_CODE;
            if(input === correct) { updatePoints((activeTaskType === 'yt') ? 250 : 150); alert("Verified!"); closeModal('verify-modal'); }
            else { alert("Wrong Code!"); }
        }

        function processWithdraw() {
            let amt = parseInt(document.getElementById('w-amount').value);
            let method = document.getElementById('method').value;
            let details = document.getElementById('w-details').value;

            if(amt < 4000 || amt > points) return alert("Invalid amount!");

            // --- Telegram ekata Withdraw Request eka yawana hati ---
            let message = `💰 *New Withdrawal Request*%0A%0A👤 User: Anonymous%0A💵 Amount: ${amt} Points%0A💳 Method: ${method}%0A📝 Details: ${details}`;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${message}&parse_mode=Markdown`)
            .then(res => {
                points -= amt;
                updatePoints(0);
                alert("Withdraw Request Sent to Admin!");
                closeModal('withdraw-modal');
            }).catch(err => alert("Error sending request. Check Internet."));
        }

        function claimDaily() {
            let today = new Date().toDateString();
            if(localStorage.getItem('lastDaily') === today) return alert("Already claimed!");
            updatePoints(50); localStorage.setItem('lastDaily', today);
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
