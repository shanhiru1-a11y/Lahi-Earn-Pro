<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    <script src="https://sad.adsgram.ai/js/adsgram-adbox.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        #balance { font-size: 40px; color: #f1c40f; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body onload="updateUI()">

    <div class="card">
        <h3>TOTAL POINTS</h3>
        <div id="balance">0</div>
    </div>

    <button class="btn" onclick="showAd()">📺 WATCH VIDEO AD (+10)</button>
    <button class="btn" style="background:#c4302b;" onclick="window.open('https://youtube.com/@hiruwaofficial-b2i')">🔴 SUBSCRIBE YOUTUBE</button>

<script>
    let points = parseInt(localStorage.getItem('points')) || 0;

    function updateUI() {
        document.getElementById('balance').innerText = points;
    }

    function showAd() {
        // AdsGram script එක පරීක්ෂා කිරීම
        if (window.Adsgram) {
            const ad = window.Adsgram.init({ blockId: "26897" });
            ad.show().then(() => {
                points += 10;
                localStorage.setItem('points', points);
                updateUI();
                alert("Success! Points added.");
            }).catch((err) => {
                alert("Ads නැත (No Fill). පසුව උත්සාහ කරන්න.");
            });
        } else {
            // Script එක load වෙලා නැති වුණොත් මේ alert එක එනවා
            alert("AdsGram script එක load වෙලා නැහැ. කරුණාකර පිටුව Refresh කරන්න හෝ Internet check කරන්න.");
        }
    }
</script>
</body>
</html>
