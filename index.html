<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f1c40f; --secondary: #0088cc; --bg: #0f172a; --card: #1e293b; --accent: #e74c3c; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: radial-gradient(circle at top, #1e293b, #0f172a); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 450px; margin: auto; animation: fadeIn 1s ease-in; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .balance-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 30px; 
            margin: 20px 0; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #balance { 
            font-size: 55px; 
            font-weight: 800; 
            color: var(--primary); 
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            transition: all 0.3s ease;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn { 
            background: var(--card); 
            color: white; 
            border: none; 
            padding: 18px 5px; 
            border-radius: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 14px; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 5px solid rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn:active { transform: scale(0.95); border-bottom: none; }

        .btn-full { grid-column: span 2; background: linear-gradient(90deg, #0088cc, #00aaff); font-size: 16px; }

        .modal { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; 
            background: #1e293b; 
            padding: 25px; 
            border-radius: 30px; 
            z-index: 1001; 
            border: 2px solid var(--primary);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }

        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <h2 style="letter-spacing: 2px; color: var(--primary);">LAHI EARN PRO</h2>
    
    <div class="balance-card">
        <p style="margin:0; opacity:0.6; font-size: 14px;">AVAILABLE POINTS</p>
        <div id="balance">0</div>
    </div>

    <div class="grid">
        <button class="btn btn-full" onclick="showAd()">📺 WATCH VIDEO AD <span style="font-size:10px; opacity:0.8;">(+10 Points)</span></button>
        <button class="btn btn-full" style="background: linear-gradient(90deg, #c4302b, #ff4444);" onclick="doTask()">🔴 SUBSCRIBE YOUTUBE <span style="font-size:10px; opacity:0.8;">(+50 Points)</span></button>
        <button class="btn" style="background: #e67e22;" onclick="openModal('lbModal')">🏆 RANKING</button>
        <button class="btn" style="background: #8e44ad;" onclick="openModal('refModal')">👥 FRIENDS</button>
        <button class="btn btn-full" style="background: linear-gradient(90deg, #27ae60, #2ecc71);" onclick="openModal('withdrawModal')">💰 WITHDRAW MONEY</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeModals()"></div>

<div id="lbModal" class="modal">
    <h3 style="color:var(--primary)">Top Earners 🏆</h3>
    <p>1. Lahiru (Admin) - 99,999</p>
    <p>2. Misha - 15,200</p>
    <button class="btn btn-full" onclick="closeModals()">CLOSE</button>
</div>

<div id="refModal" class="modal">
    <h3 style="color:var(--primary)">Invite Friends 👥</h3>
    <p>Invite your friends and get 100 points for each member!</p>
    <button class="btn btn-full" onclick="closeModals()">CLOSE</button>
</div>

<div id="withdrawModal" class="modal">
    <h3 style="color:var(--primary)">Bank Transfer</h3>
    <input type="text" placeholder="Full Name" id="accName">
    <input type="text" placeholder="Account Number" id="accNum">
    <input type="text" placeholder="Bank Name" id="accBank">
    <button class="btn btn-full" onclick="sendToTelegram()">SUBMIT REQUEST</button>
    <p style="font-size:10px; color:grey; margin-top:10px;">Minimum withdraw: 4,000 Points</p>
</div>

<script>
    let points = parseInt(localStorage.getItem('lahiPoints')) || 0;
    const BOT_TOKEN = "8707763491:AAE8b44xX4lI_k_nhjN-DwbYAfYB8S9ntWg";
    const ADMIN_CHAT_ID = "8193830513";

    function initApp() {
        document.getElementById('balance').innerText = points.toLocaleString();
    }

    // නිවැරදි කරන ලද Ad Logic එක
    function showAd() {
        if (window.adsgram) {
            const AdController = window.adsgram.init({ blockId: "26897" });
            
            AdController.show().then((result) => {
                // Ad එක සාර්ථකව බැලුවා නම් පමණක් points දෙන්න
                points += 10;
                savePoints();
                animateBalance();
                alert("සාර්ථකයි! ලකුණු 10ක් එකතු වුණා. 🎉");
            }).catch((result) => {
                // Ad එක load නොවුණොත් හෝ user skip කළොත්
                console.error(result);
                alert("දැනට Ads නොමැත. කරුණාකර මොහොතකින් නැවත උත්සාහ කරන්න.");
            });
        } else {
            alert("Ads SDK එක load වී නැත. කරුණාකර Refresh කරන්න.");
        }
    }

    function animateBalance() {
        const bal = document.getElementById('balance');
        bal.style.transform = "scale(1.2)";
        setTimeout(() => { bal.style.transform = "scale(1)"; }, 200);
    }

    function doTask() {
        window.open("https://youtube.com/@hiruwaofficial-b2i", "_blank");
        setTimeout(() => { if(confirm("ඔබ Subscribe කළාද?")) { points += 50; savePoints(); animateBalance(); } }, 5000);
    }

    function sendToTelegram() {
        const name = document.getElementById('accName').value;
        const num = document.getElementById('accNum').value;
        const bank = document.getElementById('accBank').value;
        if (points < 4000) { alert("සමාවෙන්න, ඔබට අවම ලකුණු 4000ක් නැත!"); return; }
        if (name && num && bank) {
            const msg = `🚀 NEW WITHDRAW\n👤 User: ${name}\n💳 Acc: ${num}\n🏦 Bank: ${bank}\n💰 Points: ${points}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(msg)}`);
            alert("Withdrawal Request Sent! Please wait 24h.");
            points -= 4000; savePoints(); closeModals();
        }
    }

    function openModal(id) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block';
    }

    function closeModals() {
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    function savePoints() {
        localStorage.setItem('lahiPoints', points);
        document.getElementById('balance').innerText = points.toLocaleString();
    }
</script>
</body>
</html>
