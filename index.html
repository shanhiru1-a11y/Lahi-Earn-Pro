<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .balance-card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 20px; }
        #points { font-size: 3.5em; color: var(--yellow); font-weight: 900; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 25px; z-index: 2000; box-sizing: border-box; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--yellow); margin-top: 30px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #222; color: white; text-align: center; font-size: 1.2em; }
        .claim-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="balance-card">
            <p>Your Balance</p>
            <div id="points">0</div>
            <p>POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" onclick="watchAd()">📺 Watch Ad</button>
            <button class="action-btn" onclick="startTask('yt')">🔴 YouTube (+250)</button>
            <button class="action-btn" onclick="startTask('ref')">👥 Invite (+150)</button>
            <button class="action-btn" onclick="openModal('withdraw-modal')">💸 Withdraw</button>
        </div>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 id="task-title" style="color:var(--yellow);">Verify Subscribtion</h3>
            <p id="task-desc">1. Go to YouTube & Subscribe.<br>2. Find the <b>Secret Code</b> in the video.<br>3. Enter it below to claim points.</p>
            
            <input type="text" id="secret-code-input" placeholder="Enter Secret Code Here">
            
            <div id="task-timer" style="font-size: 1.5em; margin: 10px;">Waiting 30s...</div>
            <button id="verify-task-btn" class="claim-btn" style="display:none;" onclick="validateSecretCode()">VERIFY & CLAIM</button>
            <button onclick="closeModal('task-modal')" style="color:red; background:none; border:none; margin-top:20px;">Cancel</button>
        </div>
    </div>

    <script>
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points.toLocaleString();

        // ⚠️ මෙතනට ඔයා කැමති Secret Code එකක් දාන්න (වීඩියෝ එකේ පේන්න දාන එක)
        const YT_SECRET = "LAHI77"; 
        const REF_SECRET = "SHARE10"; // මේක Referral වලට

        function startTask(type) {
            let url = (type === 'yt') ? "https://youtube.com/@hiruwaofficial-b2i?si=uwmmXfFRkSkP0rQ3" : "https://t.me/share/url?url=https://t.me/hiru1397bot&text=Join Now!";
            window.open(url, "_blank");
            
            document.getElementById('secret-code-input').value = "";
            document.getElementById('verify-task-btn').style.display = 'none';
            document.getElementById('task-timer').style.display = 'block';
            openModal('task-modal');

            let timer = 30;
            let interval = setInterval(() => {
                document.getElementById('task-timer').innerText = `Wait ${timer}s to Verify...`;
                timer--;
                if(timer < 0) {
                    clearInterval(interval);
                    document.getElementById('task-timer').style.display = 'none';
                    document.getElementById('verify-task-btn').style.display = 'block';
                }
            }, 1000);
            
            window.activeTask = type;
        }

        function validateSecretCode() {
            let input = document.getElementById('secret-code-input').value.trim().toUpperCase();
            let correctCode = (window.activeTask === 'yt') ? YT_SECRET : REF_SECRET;

            if(input === correctCode) {
                let amt = (window.activeTask === 'yt') ? 250 : 150;
                points += amt;
                localStorage.setItem('userPoints', points);
                document.getElementById('points').innerText = points.toLocaleString();
                alert("Success! Points Added.");
                closeModal('task-modal');
            } else {
                alert("Wrong Secret Code! Watch the video carefully.");
            }
        }

        function watchAd() {
            if (typeof show_10837568 === 'function') {
                show_10837568('pop').then(() => {
                    points += 100;
                    localStorage.setItem('userPoints', points);
                    document.getElementById('points').innerText = points.toLocaleString();
                });
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
