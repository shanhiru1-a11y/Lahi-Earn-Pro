<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        /* Oyaage Original Design eka (Wenas kale naha) */
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .balance-container {
            background-color: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }
        #points {
            font-size: 3rem;
            color: #ffd700;
            margin: 10px 0;
        }
        .btn-ad {
            background-color: #ffd700;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        .btn-ad:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="balance-container">
        <h3>TOTAL POINTS</h3>
        <div id="points">0</div>
        <button class="btn-ad" onclick="watchAd()">WATCH AD (+100)</button>
    </div>

    <script>
        // Points system (LocalStorage use karanne points save wenna)
        let userPoints = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = userPoints;

        function watchAd() {
            // 2. OYA EWAPU REWARDED POPUP LOGIC EKA
            if (typeof show_10837568 === 'function') {
                
                show_10837568('pop').then(() => {
                    // User ad eka balala iwara unama meka wenawa
                    addPoints(100);
                }).catch(e => {
                    // Ad error ekak awoth
                    console.error("Ad error:", e);
                    alert("Ad not available. Try again in a bit!");
                });

            } else {
                alert("Ads are initializing. Please wait...");
            }
        }

        function addPoints(amount) {
            userPoints += amount;
            localStorage.setItem('userPoints', userPoints);
            document.getElementById('points').innerText = userPoints;
            alert("Congratulations! 100 points added.");
        }
    </script>

</body>
</html>
