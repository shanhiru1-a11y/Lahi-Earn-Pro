<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s; }
        .logo-anim { width: 80px; height: 80px; background: var(--yellow); border-radius: 20px; animation: bounce 1.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .balance-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 20px; }
        #points { font-size: 3em; color: var(--yellow); font-weight: 900; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .icon { font-size: 24px; margin-bottom: 8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 25px; z-index: 1000; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #111; color: white; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim"></div>
        <h1 style="color: var(--yellow);">Lahi Earn Pro</h1>
    </div>

    <div class="container">
        <div class="balance-card">
            <p style="margin:0; opacity: 0.8;">Available Balance</p>
            <div id="points">0</div>
            <p style="margin:0; font-weight: bold;">POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" id="adBtn" onclick="watchAd()">
                <span class="icon">📺</span> <span id="adText">Watch Ad (+100)</span>
            </button>

            <button class="action-btn" id="dailyBtn" onclick="claimDaily()">
                <span class="icon">🎁</span> Daily Bonus
            </button>

            <button class="action-btn" onclick="openModal('withdraw-modal')">
                <span class="icon">💸</span> Withdraw
            </button>

            <button class="action-btn" id="refBtn" onclick="shareRef()">
                <span class="icon">👥</span> <span id="refText">Invite (+150)</span>
            </button>

            <button class="action-btn" id="ytBtn" onclick="openYT()">
                <span class="icon">🔴</span> <span id="ytText">YouTube (+250)</span>
            </button>

            <button class="action-btn" onclick="window.open('https://t.me/hiru1397bot')">
                <span class="icon">🎧</span> Support
            </button>
        </div>
        
        <p style="margin-top:20px; font-size: 0.9em; opacity: 0.7;">📊 Users Joined: <span id="user-count">0</span></p>
        <div style="opacity: 0.1; font-size: 10px;" onclick="openAdmin()">ADMIN</div>
    </div>

    <div id="withdraw-modal" class="modal">
        <h2 style="color: var(--yellow);">Withdrawal</h2>
        <select id="method"><option>Bank Transfer</option><option>Binance</option><option>eZ Cash</option></select>
        <input type="number" id="w-amount" placeholder="Points (Min 4000)">
        <button class="action-btn" style="width:100%; background:#2ecc71; color:white;" onclick="processWithdraw()">Submit</button>
        <button class="action-btn" style="width:100%; background:#e74c3c; color:white; margin-top:10px;" onclick="closeModal('withdraw-modal')">Cancel</button>
    </div>

    <script>
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points.toLocaleString();

        let totalUsers = parseInt(localStorage.getItem('total_user_count')) || 0;
        if (!localStorage.getItem('user_registered')) {
            totalUsers += 1;
            localStorage.setItem('total_user_count', totalUsers);
            localStorage.setItem('user_registered', 'true');
        }
        document.getElementById('user-count').innerText = totalUsers.toLocaleString();

        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);

        // Monetag Ad Cooldown
        function watchAd() {
            if (typeof show_10837568 === 'function') {
                show_10837568('pop').then(() => {
                    updatePoints(100);
                    startCooldown('adBtn', 'adText', "Watch Ad (+100)", 10);
                });
            }
        }

        // --- ANTI-CHEAT YOUTUBE ---
        function openYT() {
            window.open("https://youtube.com/@hiruwaofficial-b2i?si=uwmmXfFRkSkP0rQ3", "_blank");
            const btn = document.getElementById('ytBtn');
            const txt = document.getElementById('ytText');
            btn.disabled = true;
            let timer = 30; // තත්පර 30ක් ඉන්නම ඕනේ
            
            let interval = setInterval(() => {
                txt.innerText = `Checking... ${timer}s`;
                timer--;
                if(timer < 0) {
                    clearInterval(interval);
                    updatePoints(250);
                    txt.innerText = "YouTube Done ✅";
                    alert("Points Added for Subscription!");
                }
            }, 1000);
        }

        // --- ANTI-CHEAT REFERRAL ---
        function shareRef() {
            window.open(`https://t.me/share/url?url=https://t.me/hiru1397bot&text=Join Now!`);
            const btn = document.getElementById('refBtn');
            const txt = document.getElementById('refText');
            btn.disabled = true;
            let timer = 15; // තත්පර 15ක් Telegram එකේ ඉන්න ඕනේ
            
            let interval = setInterval(() => {
                txt.innerText = `Sharing... ${timer}s`;
                timer--;
                if(timer < 0) {
                    clearInterval(interval);
                    updatePoints(150);
                    txt.innerText = "Invite Done ✅";
                    alert("Referral Points Added!");
                }
            }, 1000);
        }

        function startCooldown(btnId, textId, originalText, time) {
            const btn = document.getElementById(btnId);
            const txt = document.getElementById(textId);
            btn.disabled = true;
            let timer = time;
            let interval = setInterval(() => {
                txt.innerText = `Wait ${timer}s`;
                timer--;
                if(timer < 0) { clearInterval(interval); btn.disabled = false; txt.innerText = originalText; }
            }, 1000);
        }

        function claimDaily() {
            if(localStorage.getItem('lastDaily') === new Date().toDateString()) return alert("Already Claimed!");
            updatePoints(50); localStorage.setItem('lastDaily', new Date().toDateString());
        }

        function updatePoints(amt) {
            points += amt;
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points.toLocaleString();
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function processWithdraw() {
            let amt = parseInt(document.getElementById('w-amount').value);
            if(amt < 4000 || amt > points) return alert("Invalid Amount!");
            points -= amt; updatePoints(0); alert("Requested!"); closeModal('withdraw-modal');
        }

        function openAdmin() { if(prompt("Password:") === "ADMIN4053") alert("Admin Section Ready"); }
    </script>
</body>
</html>
