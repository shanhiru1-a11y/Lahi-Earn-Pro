<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; text-align: center; }
        
        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease; }
        .logo-anim { width: 80px; height: 80px; background: var(--yellow); border-radius: 20px; animation: bounce 1.5s infinite; margin-bottom: 15px; box-shadow: 0 0 20px var(--yellow); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* UI */
        .container { padding: 20px; }
        .balance-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 25px; }
        #points { font-size: 3em; color: var(--yellow); font-weight: 900; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .action-btn:active { transform: scale(0.95); }
        .icon { font-size: 24px; margin-bottom: 8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 25px; z-index: 1000; overflow-y: auto; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #111; color: white; }
        .submit-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; }
        .close-btn { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; }

        #admin-panel { display: none; background: #222; margin-top: 30px; padding: 20px; border-radius: 15px; border: 1px dashed var(--yellow); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim"></div>
        <h1 style="color: var(--yellow);">Lahi Earn Pro</h1>
    </div>

    <div class="container">
        <div class="balance-card">
            <p style="margin:0; opacity: 0.8;">Available Balance</p>
            <div id="points">0</div>
            <p style="margin:0; font-weight: bold;">POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" onclick="watchAd()">
                <span class="icon">📺</span> Watch Ad (+100)
            </button>
            <button class="action-btn" onclick="openModal('withdraw-modal')">
                <span class="icon">💸</span> Withdraw
            </button>
            <button class="action-btn" onclick="shareRef()">
                <span class="icon">👥</span> Invite (+150)
            </button>
            <button class="action-btn" onclick="openYT()">
                <span class="icon">🔴</span> YouTube (+250)
            </button>
            
            <div class="action-btn" style="background: rgba(255,255,255,0.1); color: var(--yellow);">
                <span class="icon">📊</span> Users: <span id="user-count">0</span>
            </div>
        </div>

        <div style="margin-top: 40px; opacity: 0.3;" onclick="openAdmin()">Admin Access</div>
        <div id="admin-panel">
            <h3>Admin Panel</h3>
            <div id="request-list">No new requests.</div>
        </div>
    </div>

    <div id="withdraw-modal" class="modal">
        <h2 style="color: var(--yellow);">Withdrawal</h2>
        <select id="method" onchange="checkMethod()">
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Binance (USDT)">Binance (USDT)</option>
            <option value="eZ Cash">eZ Cash</option>
            <option value="mCash">mCash</option>
            <option value="Mobile Reload">Mobile Reload</option>
        </select>
        <div id="bank-info">
            <input type="text" id="w-name" placeholder="Full Name">
            <input type="text" id="w-bank" placeholder="Bank Name">
            <input type="text" id="w-branch" placeholder="Branch Name">
            <input type="text" id="w-acc" placeholder="Account Number">
        </div>
        <div id="other-info" style="display:none;">
            <input type="text" id="w-details" placeholder="Number or Wallet ID">
        </div>
        <input type="number" id="w-amount" placeholder="Points to Withdraw">
        <button class="submit-btn" onclick="processWithdraw()">Submit Request</button>
        <button class="close-btn" onclick="closeModal('withdraw-modal')">Cancel</button>
    </div>

    <script>
        // Data Load
        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        document.getElementById('points').innerText = points.toLocaleString();

        // --- USER COUNT LOGIC ---
        let totalUsers = parseInt(localStorage.getItem('total_user_count')) || 0;
        if (!localStorage.getItem('user_registered')) {
            totalUsers += 1;
            localStorage.setItem('total_user_count', totalUsers);
            localStorage.setItem('user_registered', 'true');
        }
        document.getElementById('user-count').innerText = totalUsers.toLocaleString();

        // Splash Hide
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 800); }, 2500);

        function watchAd() {
            if (typeof show_10837568 === 'function') {
                show_10837568('pop').then(() => { updatePoints(100); alert("Success! +100 Points."); });
            }
        }

        function openYT() {
            window.open("https://youtube.com/@hiruwaofficial-b2i?si=uwmmXfFRkSkP0rQ3", "_blank");
            setTimeout(() => { updatePoints(250); }, 8000);
        }

        function shareRef() {
            window.open(`https://t.me/share/url?url=https://t.me/hiru1397bot&text=Join Now!`);
            updatePoints(150);
        }

        function updatePoints(amt) {
            points += amt;
            localStorage.setItem('userPoints', points);
            document.getElementById('points').innerText = points.toLocaleString();
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkMethod() {
            let m = document.getElementById('method').value;
            document.getElementById('bank-info').style.display = (m === 'Bank Transfer') ? 'block' : 'none';
            document.getElementById('other-info').style.display = (m !== 'Bank Transfer') ? 'block' : 'none';
        }

        function processWithdraw() {
            let amt = parseInt(document.getElementById('w-amount').value);
            if(amt < 4000) return alert("Min: 4000!");
            if(amt > points) return alert("Insufficient!");
            
            let reqs = JSON.parse(localStorage.getItem('lahi_requests')) || [];
            reqs.push({ method: document.getElementById('method').value, amt, time: new Date().toLocaleString() });
            localStorage.setItem('lahi_requests', JSON.stringify(reqs));

            points -= amt;
            updatePoints(0); 
            alert("Submitted!");
            closeModal('withdraw-modal');
        }

        function openAdmin() {
            if(prompt("Admin Password:") === "ADMIN4053") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }
    </script>
</body>
</html>
