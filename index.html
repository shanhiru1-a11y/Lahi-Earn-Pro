<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568' async></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s ease; pointer-events: none; }
        .logo-anim { width: 80px; height: 80px; background: var(--yellow); border-radius: 20px; animation: bounce 1.5s infinite; box-shadow: 0 0 20px var(--yellow); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .container { padding: 15px; max-width: 500px; margin: auto; position: relative; z-index: 1; }
        .balance-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 20px; }
        #points { font-size: 3.5em; color: var(--yellow); font-weight: 900; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .action-btn:disabled { background: #555; color: #888; }
        .icon { font-size: 24px; margin-bottom: 8px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 25px; z-index: 1000; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--yellow); margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #111; color: white; text-align: center; box-sizing: border-box; }
        .verify-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .proof-item { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: left; border-left: 4px solid #2ecc71; }
        .status-tag { color: #2ecc71; font-weight: bold; float: right; }
        
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; width: 30px; height: 30px; opacity: 0.1; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim"></div>
        <h1 style="color: var(--yellow); margin: 10px 0 0 0;">Lahi Earn Pro</h1>
        <p style="opacity: 0.7;">Fastest Way to Earn</p>
    </div>

    <div class="container">
        <div class="balance-card">
            <p style="margin:0; opacity: 0.8;">Total Balance</p>
            <div id="points">0</div>
            <p style="margin:0; font-weight: bold;">POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" id="adBtn" onclick="watchAd()">
                <span class="icon">📺</span> <span id="adText">Watch Ad (+20)</span>
            </button>
            <button class="action-btn" onclick="openModal('proof-modal')">
                <span class="icon">📜</span> Payment Proofs
            </button>
            <button class="action-btn" onclick="openModal('withdraw-modal')">
                <span class="icon">💸</span> Withdraw
            </button>
            <button class="action-btn" onclick="claimDaily()">
                <span class="icon">🎁</span> Daily Bonus
            </button>
            <button class="action-btn" onclick="startTask('ref')">
                <span class="icon">👥</span> Invite (+150)
            </button>
            <button class="action-btn" id="ytBtn" onclick="startTask('yt')">
                <span class="icon">🔴</span> YouTube (+250)
            </button>
        </div>
        <p style="margin-top:20px; font-size: 0.8em; opacity: 0.6;">📊 Total Users: <span id="user-count">0</span></p>
    </div>

    <div id="proof-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--yellow); margin-top:0;">Payment Proofs</h2>
            <div id="payout-list">
                <p id="no-proofs" style="opacity: 0.5;">No payments yet.</p>
            </div>
            <button onclick="closeModal('proof-modal')" style="background:none; color:red; border:none; margin-top:15px; cursor:pointer;">Close</button>
        </div>
    </div>

    <div id="admin-login-modal" class="modal">
        <div class="modal-content">
            <h3>Admin Login</h3>
            <input type="password" id="admin-pw" placeholder="Enter Password">
            <button class="verify-btn" onclick="checkAdminPw()">Login</button>
            <button onclick="closeModal('admin-login-modal')" style="background:none; color:red; border:none; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="admin-panel-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--yellow);">Admin Control</h3>
            <input type="text" id="p-user" placeholder="User (e.g. 9477****21)">
            <input type="text" id="p-amount" placeholder="Amount (e.g. Rs. 400)">
            <button class="verify-btn" onclick="addProof()">Add Success Proof ✅</button>
            <button onclick="clearAllProofs()" style="background:red; color:white; border:none; padding:10px; margin-top:10px; border-radius:5px; width:100%;">Clear All Proofs</button>
            <button onclick="closeModal('admin-panel-modal')" style="background:none; color:red; border:none; margin-top:15px;">Exit Admin</button>
        </div>
    </div>

    <div class="admin-trigger" onclick="openModal('admin-login-modal')"></div>

    <div id="withdraw-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--yellow); margin-top:0;">Withdraw</h2>
            <p style="color:#2ecc71; font-weight:bold; margin-bottom:10px;">💰 4,000 Points = Rs. 400</p>
            <select id="method" onchange="toggleBankFields()">
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Binance">Binance</option>
                <option value="mCash">eZ Cash / mCash</option>
            </select>
            <div id="bank-fields">
                <input type="text" id="w-name" placeholder="Full Name">
                <input type="text" id="w-acc" placeholder="Account Number">
                <input type="text" id="w-bankname" placeholder="Bank Name">
                <input type="text" id="w-branch" placeholder="Branch Name">
            </div>
            <input type="text" id="w-other" placeholder="Wallet ID / Phone Number" style="display:none;">
            <input type="number" id="w-amount" placeholder="Points (Min 4000)">
            <button class="verify-btn" onclick="processWithdraw()">Send Request</button>
            <button onclick="closeModal('withdraw-modal')" style="background:none; color:red; border:none; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="verify-modal" class="modal"><div class="modal-content"><h3>Verify Task</h3><input type="text" id="v-input" placeholder="Enter Code"><div id="v-timer">30s</div><button id="v-claim-btn" class="verify-btn" style="display:none;" onclick="checkSecretCode()">Claim Points</button><button onclick="closeModal('verify-modal')" style="background:none; color:red; border:none; margin-top:10px;">Cancel</button></div></div>

    <script>
        const BOT_TOKEN = "8707763491:AAE8b44xX4lI_k_nhjN-DwbYAfYB8S9ntWg"; 
        const ADMIN_CHAT_ID = "8193830513";
        const ADMIN_PASS = "ADMIN4053";
        const YT_CODE = "LAHI77"; const REF_CODE = "JOIN150";

        let points = parseInt(localStorage.getItem('userPoints')) || 0;
        let proofs = JSON.parse(localStorage.getItem('paymentProofs')) || [];

        window.addEventListener('load', () => {
            renderProofs();
            updateUI();
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 800);
            }, 2500);
        });

        // Admin Functions
        function checkAdminPw() {
            if(document.getElementById('admin-pw').value === ADMIN_PASS) {
                closeModal('admin-login-modal');
                openModal('admin-panel-modal');
            } else { alert("Wrong Password!"); }
        }

        function addProof() {
            const user = document.getElementById('p-user').value;
            const amt = document.getElementById('p-amount').value;
            if(!user || !amt) return alert("Fill details!");
            proofs.push({user: user, amt: amt});
            localStorage.setItem('paymentProofs', JSON.stringify(proofs));
            renderProofs();
            alert("Added!");
        }

        function clearAllProofs() { if(confirm("Delete all?")) { proofs = []; localStorage.removeItem('paymentProofs'); renderProofs(); } }

        function renderProofs() {
            const list = document.getElementById('payout-list');
            list.innerHTML = "";
            if(proofs.length === 0) { list.innerHTML = '<p id="no-proofs" style="opacity: 0.5;">No payments yet.</p>'; return; }
            proofs.forEach(p => {
                list.innerHTML += `<div class="proof-item"><span class="status-tag">Success ✅</span><strong>${p.user}</strong><span>${p.amt}</span></div>`;
            });
        }

        // Logic Functions
        function toggleBankFields() {
            const m = document.getElementById('method').value;
            document.getElementById('bank-fields').style.display = (m === "Bank Transfer") ? 'block' : 'none';
            document.getElementById('w-other').style.display = (m === "Bank Transfer") ? 'none' : 'block';
        }

        function watchAd() { if (typeof show_10837568 === 'function') { show_10837568('pop').then(() => { points += 20; updateUI(); startAdCooldown(); }); } }
        function startAdCooldown() {
            const btn = document.getElementById('adBtn'); const txt = document.getElementById('adText');
            btn.disabled = true; let timer = 10;
            let interval = setInterval(() => { txt.innerText = `Wait ${timer}s`; timer--; if(timer < 0) { clearInterval(interval); btn.disabled = false; txt.innerText = "Watch Ad (+20)"; } }, 1000);
        }

        function processWithdraw() {
            const m = document.getElementById('method').value;
            const amt = parseInt(document.getElementById('w-amount').value);
            if(amt < 4000 || amt > points) return alert("Check Balance!");
            let det = (m === "Bank Transfer") ? `%0AName: ${document.getElementById('w-name').value}%0AAcc: ${document.getElementById('w-acc').value}` : document.getElementById('w-other').value;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=💰 *Withdraw!*%0AMethod: ${m}${det}%0APoints: ${amt}&parse_mode=Markdown`)
            .then(() => { points -= amt; updateUI(); alert("Sent!"); closeModal('withdraw-modal'); });
        }

        function startTask(type) {
            activeTaskType = type; window.open((type === 'yt') ? "https://youtube.com/@hiruwaofficial-b2i" : "https://t.me/share/url?url=https://t.me/hiru1397bot", "_blank");
            openModal('verify-modal'); let timer = (type === 'yt') ? 30 : 15;
            let interval = setInterval(() => { document.getElementById('v-timer').innerText = `Verifying... ${timer}s`; timer--; if(timer < 0) { clearInterval(interval); document.getElementById('v-timer').style.display = 'none'; document.getElementById('v-claim-btn').style.display = 'block'; } }, 1000);
        }

        function checkSecretCode() {
            if(document.getElementById('v-input').value.trim().toUpperCase() === ((activeTaskType === 'yt') ? YT_CODE : REF_CODE)) {
                points += (activeTaskType === 'yt') ? 250 : 150; updateUI(); alert("Success!"); closeModal('verify-modal');
            } else { alert("Wrong Code!"); }
        }

        function claimDaily() {
            if(localStorage.getItem('lastDaily') === new Date().toDateString()) return alert("Already claimed!");
            points += 50; updateUI(); localStorage.setItem('lastDaily', new Date().toDateString());
        }

        function updateUI() { localStorage.setItem('userPoints', points); document.getElementById('points').innerText = points.toLocaleString(); }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        let totalUsers = parseInt(localStorage.getItem('total_user_count')) || 250;
        if (!localStorage.getItem('user_registered')) { totalUsers += 1; localStorage.setItem('total_user_count', totalUsers); localStorage.setItem('user_registered', 'true'); }
        document.getElementById('user-count').innerText = totalUsers.toLocaleString();
    </script>
</body>
</html>
