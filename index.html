<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10837568' data-sdk='show_10837568'></script>

    <style>
        :root { --bg-blue: #001f3f; --yellow: #ffd700; --white: #ffffff; }
        body { background-color: var(--bg-blue); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* Splash Screen */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; opacity: 1; transition: opacity 0.5s ease-in-out; }
        .logo-anim { width: 80px; height: 80px; background: var(--yellow); border-radius: 20px; animation: bounce 1.5s infinite; margin-bottom: 10px; box-shadow: 0 0 20px var(--yellow); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Main UI */
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .balance-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 2px solid var(--yellow); margin-bottom: 20px; }
        #points { font-size: 3.5em; color: var(--yellow); font-weight: 900; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .action-btn { background: var(--yellow); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .action-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .icon { font-size: 24px; margin-bottom: 8px; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); padding: 25px; z-index: 1000; box-sizing: border-box; overflow-y: auto; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--yellow); margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--yellow); background: #111; color: white; text-align: center; }
        .verify-btn { background: #2ecc71; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .proof-item { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: left; border-left: 4px solid #2ecc71; }
        .status-tag { color: #2ecc71; font-weight: bold; float: right; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-anim"></div>
        <h1 style="color: var(--yellow); margin: 0;">Lahi Earn Pro</h1>
        <p style="opacity: 0.7;">Fastest Way to Earn</p>
    </div>

    <div class="container">
        <div class="balance-card">
            <p style="margin:0; opacity: 0.8;">Total Balance</p>
            <div id="points">0</div>
            <p style="margin:0; font-weight: bold;">POINTS</p>
        </div>

        <div class="grid-menu">
            <button class="action-btn" id="adBtn" onclick="watchAd()">
                <span class="icon">📺</span> <span id="adText">Watch Ad (+100)</span>
            </button>
            <button class="action-btn" onclick="openModal('proof-modal')">
                <span class="icon">📜</span> Payment Proofs
            </button>
            <button class="action-btn" onclick="openModal('withdraw-modal')">
                <span class="icon">💸</span> Withdraw
            </button>
            <button class="action-btn" onclick="claimDaily()">
                <span class="icon">🎁</span> Daily Bonus
            </button>
            <button class="action-btn" onclick="startTask('ref')">
                <span class="icon">👥</span> Invite (+150)
            </button>
            <button class="action-btn" id="ytBtn" onclick="startTask('yt')">
                <span class="icon">🔴</span> YouTube (+250)
            </button>
        </div>

        <p style="margin-top:20px; font-size: 0.8em; opacity: 0.6;">📊 Total Users: <span id="user-count">0</span></p>
    </div>

    <div id="proof-modal" class="modal"><div class="modal-content"><h2 style="color:var(--yellow); margin-top:0;">Payment Proofs</h2><div class="proof-item"><span class="status-tag">Paid ✅</span><strong>9477****21</strong><span>Rs. 450 (mCash)</span></div><div class="proof-item"><span class="status-tag">Paid ✅</span><strong>9471****88</strong><span>Rs. 520 (Bank)</span></div><button onclick="closeModal('proof-modal')" style="background:none; color:red; border:none; margin-top:15px;">Close</button></div></div>

    <div id="withdraw-modal" class="modal"><div class="modal-content"><h2 style="color:var(--yellow); margin-top:0;">Withdraw</h2><p style="color:#2ecc71; font-weight:bold; margin-bottom:10px;">💰 4,000 Points = Rs. 400</p><select id="method"><option value="Bank">Bank Transfer</option><option value="Binance">Binance</option><option value="mCash">eZ Cash / mCash</option></select><input type="text" id="w-details" placeholder="Account No"><input type="number" id="w-amount" placeholder="Min 4000"><button class="verify-btn" onclick="processWithdraw()">Send Request</button><button onclick="closeModal('withdraw-modal')" style="background:none; color:red; border:none; margin-top:10px;">Close</button>
