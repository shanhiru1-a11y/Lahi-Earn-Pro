<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lahi Earn Pro | Official</title>
    <script src="https://adsgram.ai/sdk-v1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --admin-gold: #d4af37; --admin-bg: #050505; --card-bg: #111; --text-color: #e0e0e0; }
        
        body { 
            font-family: 'Poppins', sans-serif; background: var(--admin-bg); color: var(--text-color); 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Splash Screen Animation */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .logo-text {
            font-size: 28px; font-weight: 800; color: var(--admin-gold);
            letter-spacing: 5px; animation: fadePulse 1.5s infinite;
        }
        @keyframes fadePulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* Container & Cards */
        .container { max-width: 500px; margin: auto; padding: 20px; display: none; animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 15px; 
            border: 1px solid #222; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 2px solid var(--admin-gold); }
        .stat-item h4 { margin: 0; font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-item p { margin: 5px 0 0; font-size: 18px; font-weight: 800; color: var(--admin-gold); }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-bottom: 10px;
        }
        .btn-gold { background: var(--admin-gold); color: black; }
        .btn-dark { background: #1a1a1a; color: white; border: 1px solid #333; }

        #adminPanel { display: none; padding: 20px; background: #000; min-height: 100vh; }
    </style>
</head>
<body onload="initApp()">

<div id="splash">
    <div class="logo-text">LAHI EARN PRO</div>
    <p style="font-size: 10px; color: #555; margin-top: 10px;">PREPARING SECURE ENVIRONMENT...</p>
</div>

<div id="userView" class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--admin-gold); margin: 0; font-size: 20px;">DASHBOARD</h2>
        <button onclick="checkAdmin()" style="background:none; border:none; color:#333; font-size:10px;">ADMIN ACCESS</button>
    </div>

    <div class="card">
        <div class="stat-box">
            <div class="stat-item">
                <h4>MEMBERS JOINED</h4>
                <p id="totalUsers">0</p> </div>
            <div class="stat-item">
                <h4>MY BALANCE</h4>
                <p id="userBalance">0</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h4 style="margin-top: 0; font-size: 14px; color: var(--admin-gold);">ACTIVE TASKS</h4>
        <button class="btn btn-gold" onclick="showAd()">📺 WATCH VIDEO AD (+80)</button>
        <button class="btn btn-dark" onclick="window.open('https://youtube.com/@hiruwaofficial-b2i')">🔴 YOUTUBE SUBSCRIBE (+50)</button>
    </div>

    <button class="btn btn-gold" style="border-radius: 50px; margin-top: 20px;" onclick="openWithdraw()">💰 WITHDRAWAL REQUEST</button>
</div>

<div id="adminPanel" class="container">
    <h2 style="color: var(--admin-gold);">ADMIN SUITE</h2>
    <div class="card">
        <p>Commission Earnt: <span id="adminComm">0</span> Pts</p>
        <p>Pending Tasks: <span style="color: var(--admin-gold);">0</span></p>
    </div>
    <button class="btn btn-dark" onclick="location.reload()">EXIT ADMIN MODE</button>
</div>

<script>
    let points = parseInt(localStorage.getItem('lahiPoints')) || 0;
    const BOT_TOKEN = "8707763491:AAE8b44xX4lI_k_nhjN-DwbYAfYB8S9ntWg";
    const ADMIN_CHAT_ID = "8193830513";
    let AdController;

    function initApp() {
        // අලුත් User කෙනෙක් ආවම Admin ට Notification එකක් යනවා
        if (!localStorage.getItem('userRegistered')) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=🚀 New User Joined Lahi Earn Pro!`);
            localStorage.setItem('userRegistered', 'true');
        }

        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('userView').style.display = 'block';
            updateUI();
        }, 3000);

        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "26784" });
        }
    }

    function updateUI() {
        document.getElementById('userBalance').innerText = points.toLocaleString();
        // මෙතන අගය 0 ලෙසම තබා ඇත. ඔබට පසුව මෙය වෙනස් කළ හැක.
        document.getElementById('totalUsers').innerText = "0"; 
    }

    function showAd() {
        if (AdController) {
            AdController.show().then(() => {
                points += 80;
                localStorage.setItem('lahiPoints', points);
                updateUI();
                // Admin Commission Alert
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=💰 Commission Received: 20 Points`);
            }).catch(() => alert("Ad not ready yet!"));
        }
    }

    function openWithdraw() {
        if (points < 4000) {
            alert("අවම ලකුණු 4000ක් අවශ්‍යයි!");
            return;
        }
        let method = prompt("Method (Binance, EzCash, mCash, Reload):");
        let details = prompt("Account No / Phone No:");
        if (method && details) {
            const msg = `🔔 *WITHDRAW REQUEST*\nMethod: ${method}\nDetails: ${details}\nPoints: ${points}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            alert("Request Sent! Admin will check and approve.");
            points = 0;
            localStorage.setItem('lahiPoints', points);
            updateUI();
        }
    }

    function checkAdmin() {
        let pass = prompt("Admin Password:");
        if (pass === "ADMIN789") {
            document.getElementById('userView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("Wrong Password!");
        }
    }
</script>

</body>
</html>
